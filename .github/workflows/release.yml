name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: node20-linux-x64
            suffix: linux-x64
            artifact: steamblock-link-linux-x64
          - os: ubuntu-latest
            target: node20-win-x64
            suffix: win-x64
            artifact: steamblock-link-win-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Download arduino-cli
        run: |
          mkdir -p resources/arduino-cli
          if [ "${{ matrix.suffix }}" = "win-x64" ]; then
            curl -sL https://downloads.arduino.cc/arduino-cli/arduino-cli_latest_Windows_64bit.zip -o /tmp/cli.zip
            unzip -o /tmp/cli.zip -d resources/arduino-cli/
          else
            curl -sL https://downloads.arduino.cc/arduino-cli/arduino-cli_latest_Linux_64bit.tar.gz -o /tmp/cli.tar.gz
            tar xzf /tmp/cli.tar.gz -C resources/arduino-cli/
          fi

      - name: Download vendored libraries
        run: |
          mkdir -p resources/arduino-libs
          # SimpleList no está en el índice oficial, se vendorea.
          # Por ahora creamos el directorio vacío; el Link lo crea si falta.

      - name: Bundle with pkg
        run: npx pkg dist/index.js --target ${{ matrix.target }} --output dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
