name: Build & Release

# Compila el instalador de Windows en un runner nativo (Go puro + Inno Setup) y
# lo adjunta al Release. Se dispara al empujar un tag vX.Y.Z, o a mano.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Tests
        run: go test ./...

      - name: Build exe (sin consola)
        shell: bash
        run: |
          mkdir -p dist/staging/resources/arduino-cli dist/staging/resources/arduino-libs
          go build -ldflags="-H=windowsgui -s -w" -o dist/staging/steamblock-link.exe ./cmd/steamblock-link

      - name: Empaquetar arduino-cli
        shell: pwsh
        run: |
          $tmp = "$env:TEMP\arduino-cli.zip"
          Invoke-WebRequest "https://downloads.arduino.cc/arduino-cli/arduino-cli_latest_Windows_64bit.zip" -OutFile $tmp
          Expand-Archive $tmp -DestinationPath dist\staging\resources\arduino-cli -Force

      - name: Instalar Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compilar instalador
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          if (-not $v) { $v = "0.0.0" }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=$v installer\steamblock-link.iss

      - name: Adjuntar al Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/STEAMBLOCK-Link-Setup-*.exe
          generate_release_notes: true

      - name: Subir artefacto (ejecución manual)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: STEAMBLOCK-Link-Setup
          path: dist/STEAMBLOCK-Link-Setup-*.exe
